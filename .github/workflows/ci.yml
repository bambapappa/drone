name: CI

on:
  push:
    branches: [main, dev, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install CPU torch (smaller than default CUDA build)
        run: uv pip install --system torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Install dependencies
        run: |
          uv pip install --system -r pyproject.toml
          uv pip install --system ruff pytest pytest-asyncio
      - name: Lint
        run: |
          ruff check app/ tests/ scripts/ analysis/ review/
          ruff format --check app/ tests/ scripts/ analysis/ review/
      - name: Test
        run: pytest tests/ -v
