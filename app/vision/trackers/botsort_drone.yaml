# BoT-SORT tuned for drone footage (moving camera, small targets).
# Based on ultralytics botsort.yaml defaults; see DECISIONS.md B2.

tracker_type: botsort
track_high_thresh: 0.40
track_low_thresh: 0.10
new_track_thresh: 0.50
track_buffer: 120          # ~8 s at 15 Hz detection: survive occlusions without ID churn
match_thresh: 0.85
fuse_score: True

gmc_method: sparseOptFlow  # camera motion compensation for the moving drone

proximity_thresh: 0.5
appearance_thresh: 0.30
with_reid: True            # detector-feature ReID stabilizes IDs through crossings
model: auto
