services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - VIDEO_DIR=/videos
    volumes:
      - ./videos:/videos
      # Egna modellvikter (t.ex. VisDrone): lägg .pt-filer i ./models och
      # sätt MODEL=models/visdrone-yolov8s.pt i .env
      - ./models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
